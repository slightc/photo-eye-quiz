<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>摄影眼 · 审美对比测验</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ===== 取景器 / 暗房 主题 ===== */
  :root{
    --bg:#17151B;
    --panel:#201E26;
    --panel-2:#262430;
    --line:#37333F;
    --ink:#ECE7DE;
    --muted:#8E8995;
    --amber:#E6A23C;        /* 强调:对焦框 / 维度刻字 */
    --amber-soft:rgba(230,162,60,.13);
    --ok:#67C18C;
    --bad:#E0685F;
    --shadow:0 18px 50px -20px rgba(0,0,0,.7);
    --mono:'Space Grotesk',ui-monospace,monospace;
    --zh:"PingFang SC","Microsoft YaHei","Hiragino Sans GB",system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:
      radial-gradient(1100px 600px at 50% -10%, #221F2A 0%, var(--bg) 55%),
      var(--bg);
    color:var(--ink);
    font-family:var(--zh);
    -webkit-font-smoothing:antialiased;
    line-height:1.6;
    min-height:100%;
    display:flex;
    justify-content:center;
  }
  .stage{
    width:100%;
    max-width:1040px;
    padding:28px 22px 64px;
  }

  /* ===== 顶部状态条:像相机背屏 ===== */
  .topbar{
    display:flex;align-items:center;gap:16px;flex-wrap:wrap;
    padding-bottom:20px;margin-bottom:24px;
    border-bottom:1px solid var(--line);
  }
  .brand{display:flex;align-items:baseline;gap:12px;margin-right:auto}
  .brand h1{
    font-family:var(--mono);font-weight:600;font-size:18px;letter-spacing:.04em;
  }
  .brand .dot{color:var(--amber)}
  .brand .sub{
    font-family:var(--mono);font-size:11px;letter-spacing:.34em;
    color:var(--muted);text-transform:uppercase;
  }
  .counter{
    font-family:var(--mono);font-weight:600;font-size:14px;letter-spacing:.12em;
    color:var(--ink);
    background:var(--panel);border:1px solid var(--line);
    padding:7px 12px;border-radius:8px;
    display:flex;align-items:center;gap:8px;
  }
  .counter .rec{width:7px;height:7px;border-radius:50%;background:var(--amber);
    box-shadow:0 0 0 0 var(--amber);animation:pulse 2.4s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(230,162,60,.5)}70%{box-shadow:0 0 0 6px rgba(230,162,60,0)}100%{box-shadow:0 0 0 0 rgba(230,162,60,0)}}
  .gridtoggle{
    font-family:var(--mono);font-size:11px;letter-spacing:.14em;color:var(--muted);
    background:var(--panel);border:1px solid var(--line);
    padding:8px 12px;border-radius:8px;cursor:pointer;
    display:flex;align-items:center;gap:8px;transition:color .2s,border-color .2s;
  }
  .gridtoggle:hover{color:var(--ink);border-color:#4a4654}
  .gridtoggle .led{width:8px;height:8px;border-radius:2px;background:#4a4654;transition:background .2s}
  .gridtoggle[aria-pressed="true"] .led{background:var(--amber)}
  .gridtoggle[aria-pressed="true"]{color:var(--ink)}

  /* ===== 题目区 ===== */
  .prompt{margin-bottom:18px}
  .eyebrow{
    font-family:var(--mono);font-size:11.5px;letter-spacing:.26em;
    color:var(--amber);text-transform:uppercase;
    display:inline-flex;align-items:center;gap:9px;margin-bottom:9px;
  }
  .eyebrow::before{content:"";width:22px;height:1px;background:var(--amber);opacity:.6}
  .prompt h2{font-size:22px;font-weight:600;letter-spacing:-.01em}
  .prompt .hint{color:var(--muted);font-size:13.5px;margin-top:4px}

  /* ===== 两张取景画面 ===== */
  .pair{
    display:grid;grid-template-columns:1fr 1fr;gap:22px;margin:22px 0 8px;
  }
  .shot{
    position:relative;cursor:pointer;border-radius:12px;
    background:#000;border:1px solid var(--line);
    overflow:hidden;
    transition:transform .18s ease,border-color .18s ease,box-shadow .18s ease;
    outline:none;
  }
  .shot:hover{transform:translateY(-3px);border-color:#54505f;box-shadow:var(--shadow)}
  .shot:focus-visible{border-color:var(--amber);box-shadow:0 0 0 3px var(--amber-soft)}
  .shot .canvas{display:block;width:100%;aspect-ratio:3/2}
  .shot .canvas svg{display:block;width:100%;height:100%}

  /* 框角(crop marks) */
  .corner{position:absolute;width:18px;height:18px;border:2px solid rgba(255,255,255,.85);pointer-events:none;opacity:.9;transition:border-color .18s}
  .c-tl{top:9px;left:9px;border-right:none;border-bottom:none}
  .c-tr{top:9px;right:9px;border-left:none;border-bottom:none}
  .c-bl{bottom:9px;left:9px;border-right:none;border-top:none}
  .c-br{bottom:9px;right:9px;border-left:none;border-top:none}

  /* 九宫格辅助线 */
  .grid-overlay{position:absolute;inset:0;pointer-events:none;opacity:0;transition:opacity .25s}
  .grids-on .grid-overlay{opacity:.5}
  .grid-overlay span{position:absolute;background:rgba(255,255,255,.55)}
  .grid-overlay .v1{left:33.33%;top:0;bottom:0;width:1px}
  .grid-overlay .v2{left:66.66%;top:0;bottom:0;width:1px}
  .grid-overlay .h1{top:33.33%;left:0;right:0;height:1px}
  .grid-overlay .h2{top:66.66%;left:0;right:0;height:1px}

  /* 角标 A / B */
  .tag{
    position:absolute;left:14px;bottom:14px;z-index:3;
    font-family:var(--mono);font-weight:600;font-size:13px;letter-spacing:.1em;
    color:#fff;background:rgba(0,0,0,.5);backdrop-filter:blur(2px);
    border:1px solid rgba(255,255,255,.25);
    width:30px;height:30px;border-radius:7px;
    display:flex;align-items:center;justify-content:center;
  }

  /* 选择结果状态 */
  .shot.is-good{border-color:var(--ok);box-shadow:0 0 0 3px rgba(103,193,140,.22)}
  .shot.is-good .corner{border-color:var(--ok)}
  .shot.is-good .tag{background:var(--ok);border-color:var(--ok);color:#10231a}
  .shot.is-bad{border-color:var(--bad);box-shadow:0 0 0 3px rgba(224,104,95,.22)}
  .shot.is-bad .corner{border-color:var(--bad)}
  .shot.is-bad .tag{background:var(--bad);border-color:var(--bad);color:#2a0f0d}
  .shot.picked::after{
    content:attr(data-mark);position:absolute;top:14px;right:14px;z-index:3;
    font-family:var(--mono);font-size:11px;letter-spacing:.12em;
    padding:4px 9px;border-radius:6px;color:#fff;
  }
  .shot.is-good.picked::after{content:"你选 · 对";background:var(--ok);color:#10231a}
  .shot.is-bad.picked::after{content:"你选 · 错";background:var(--bad);color:#2a0f0d}
  .shot.is-good:not(.picked)::after{content:"更佳";background:var(--ok);color:#10231a;
    position:absolute;top:14px;right:14px;z-index:3;font-family:var(--mono);font-size:11px;letter-spacing:.12em;padding:4px 9px;border-radius:6px}
  .answered .shot{cursor:default;pointer-events:none}
  .answered .shot:hover{transform:none;box-shadow:none}
  .shake{animation:shake .4s}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}

  /* ===== 解析卡 ===== */
  .readout{
    margin-top:18px;border:1px solid var(--line);border-radius:14px;
    background:linear-gradient(180deg,var(--panel) 0%,var(--panel-2) 100%);
    overflow:hidden;
    max-height:0;opacity:0;transform:translateY(8px);
    transition:max-height .4s ease,opacity .35s ease,transform .35s ease;
  }
  .readout.show{max-height:520px;opacity:1;transform:translateY(0)}
  .readout-inner{padding:20px 22px}
  .verdict{display:flex;align-items:center;gap:11px;margin-bottom:13px}
  .verdict .badge{
    font-family:var(--mono);font-size:11px;letter-spacing:.14em;
    padding:4px 10px;border-radius:6px;flex:none;
  }
  .verdict .badge.ok{background:rgba(103,193,140,.16);color:var(--ok);border:1px solid rgba(103,193,140,.4)}
  .verdict .badge.no{background:rgba(224,104,95,.16);color:var(--bad);border:1px solid rgba(224,104,95,.4)}
  .verdict .v-text{font-size:15.5px;font-weight:600}
  .points{list-style:none;display:flex;flex-direction:column;gap:9px}
  .points li{position:relative;padding-left:20px;color:#cfc9d2;font-size:14px}
  .points li::before{content:"";position:absolute;left:2px;top:9px;width:7px;height:7px;border:1.5px solid var(--amber);border-radius:50%}
  .soft-note{margin-top:13px;font-size:12.5px;color:var(--muted);
    border-left:2px solid var(--line);padding-left:12px;font-style:normal}
  .soft-note b{color:#b6b1bd;font-weight:600}

  /* ===== 操作行 ===== */
  .actions{display:flex;justify-content:flex-end;margin-top:20px}
  .btn{
    font-family:var(--mono);font-weight:600;font-size:13px;letter-spacing:.08em;
    color:#1a160e;background:var(--amber);border:none;
    padding:13px 26px;border-radius:10px;cursor:pointer;
    display:inline-flex;align-items:center;gap:10px;
    transition:transform .15s,filter .15s;
  }
  .btn:hover{filter:brightness(1.07)}
  .btn:active{transform:translateY(1px)}
  .btn:focus-visible{outline:3px solid var(--amber-soft);outline-offset:2px}
  .btn .arrow{transition:transform .2s}
  .btn:hover .arrow{transform:translateX(3px)}

  /* ===== 成绩页 ===== */
  .result{text-align:center;padding:8px 0}
  .result .score-mono{font-family:var(--mono);font-size:13px;letter-spacing:.3em;color:var(--amber);text-transform:uppercase;margin-bottom:14px}
  .result .score-big{font-family:var(--mono);font-weight:700;font-size:76px;line-height:1;letter-spacing:-.02em}
  .result .score-big .of{color:var(--muted);font-size:34px}
  .result .grade{font-size:20px;font-weight:600;margin-top:14px}
  .result .blurb{color:var(--muted);max-width:520px;margin:10px auto 0;font-size:14.5px}
  .recap{
    margin:34px auto 28px;max-width:560px;
    border:1px solid var(--line);border-radius:14px;background:var(--panel);
    overflow:hidden;text-align:left;
  }
  .recap .row{display:flex;align-items:center;gap:14px;padding:13px 18px;border-bottom:1px solid var(--line)}
  .recap .row:last-child{border-bottom:none}
  .recap .idx{font-family:var(--mono);font-size:12px;color:var(--muted);width:26px;flex:none}
  .recap .dim{flex:1;font-size:14px}
  .recap .dim small{display:block;font-family:var(--mono);font-size:10.5px;letter-spacing:.16em;color:var(--muted);text-transform:uppercase}
  .recap .mk{font-family:var(--mono);font-size:11px;letter-spacing:.1em;padding:4px 9px;border-radius:6px;flex:none}
  .recap .mk.y{background:rgba(103,193,140,.16);color:var(--ok)}
  .recap .mk.n{background:rgba(224,104,95,.16);color:var(--bad)}
  .result .actions{justify-content:center;margin-top:8px}

  .foot{margin-top:30px;text-align:center;color:var(--muted);font-size:12px;line-height:1.7}
  .foot .mono{font-family:var(--mono);letter-spacing:.1em}

  @media (max-width:680px){
    .pair{grid-template-columns:1fr;gap:16px}
    .prompt h2{font-size:19px}
    .result .score-big{font-size:60px}
    .brand .sub{display:none}
  }
  @media (prefers-reduced-motion:reduce){
    *{animation:none!important;transition:none!important}
    .readout{max-height:none}
  }
</style>
</head>
<body>

<!-- 全局渐变 / 滤镜库:供所有 SVG 引用 -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <linearGradient id="skyDusk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#27314e"/><stop offset="48%" stop-color="#834b46"/><stop offset="100%" stop-color="#e69b46"/>
    </linearGradient>
    <linearGradient id="seaDusk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#cf833f"/><stop offset="100%" stop-color="#2c2942"/>
    </linearGradient>
    <linearGradient id="skyNoon" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5c98cd"/><stop offset="100%" stop-color="#b3d2e8"/>
    </linearGradient>
    <linearGradient id="field" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#909a5a"/><stop offset="100%" stop-color="#525c36"/>
    </linearGradient>
    <linearGradient id="mist" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#cfd6dc"/><stop offset="100%" stop-color="#eef1f3"/>
    </linearGradient>
    <linearGradient id="mountSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f0dcc0"/><stop offset="100%" stop-color="#f6ecdd"/>
    </linearGradient>
    <linearGradient id="portraitSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a2f4a"/><stop offset="100%" stop-color="#cd7b3f"/>
    </linearGradient>
    <linearGradient id="goldGround" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#caa05c"/><stop offset="100%" stop-color="#8a6a36"/>
    </linearGradient>
    <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/></filter>
    <filter id="dof" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="6"/></filter>
    <filter id="motion" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="11 0"/></filter>
  </defs>
</svg>

<main class="stage grids-on">
  <header class="topbar">
    <div class="brand">
      <h1>摄影眼<span class="dot">.</span></h1>
      <span class="sub">aesthetic eye test</span>
    </div>
    <div class="counter" id="counter"><span class="rec"></span><span id="counterText">01 / 38</span></div>
    <button class="gridtoggle" id="gridToggle" aria-pressed="true">
      <span class="led"></span>九宫格
    </button>
  </header>

  <section id="quizView">
    <div class="prompt">
      <span class="eyebrow" id="eyebrow">取景 · 水平</span>
      <h2 id="qTitle">哪一张更稳？</h2>
      <p class="hint" id="qHint">凭直觉,先选你更想留下的那一张。</p>
    </div>

    <div class="pair" id="pair">
      <div class="shot" id="slotA" role="button" tabindex="0" aria-label="选择 A 图" data-slot="A">
        <div class="canvas" id="canvasA"></div>
        <span class="corner c-tl"></span><span class="corner c-tr"></span>
        <span class="corner c-bl"></span><span class="corner c-br"></span>
        <div class="grid-overlay"><span class="v1"></span><span class="v2"></span><span class="h1"></span><span class="h2"></span></div>
        <span class="tag">A</span>
      </div>
      <div class="shot" id="slotB" role="button" tabindex="0" aria-label="选择 B 图" data-slot="B">
        <div class="canvas" id="canvasB"></div>
        <span class="corner c-tl"></span><span class="corner c-tr"></span>
        <span class="corner c-bl"></span><span class="corner c-br"></span>
        <div class="grid-overlay"><span class="v1"></span><span class="v2"></span><span class="h1"></span><span class="h2"></span></div>
        <span class="tag">B</span>
      </div>
    </div>

    <div class="readout" id="readout">
      <div class="readout-inner">
        <div class="verdict">
          <span class="badge" id="vBadge"></span>
          <span class="v-text" id="vText"></span>
        </div>
        <ul class="points" id="vPoints"></ul>
        <div class="soft-note" id="vSoft" style="display:none"></div>
      </div>
    </div>

    <div class="actions" id="actions" style="visibility:hidden">
      <button class="btn" id="nextBtn">下一张 <span class="arrow">→</span></button>
    </div>
  </section>

  <section id="resultView" style="display:none">
    <div class="result">
      <div class="score-mono">冲洗完成 · 你的成绩</div>
      <div class="score-big"><span id="scoreNum">0</span><span class="of"> / <span id="scoreOf">38</span></span></div>
      <div class="grade" id="grade"></div>
      <p class="blurb" id="blurb"></p>
      <div class="recap" id="recap"></div>
      <div class="actions">
        <button class="btn" id="againBtn">再来一卷 <span class="arrow">↻</span></button>
      </div>
    </div>
  </section>

  <footer class="foot">
    <div class="mono">VIEWFINDER TEST · 38 FRAMES</div>
    <div>这些是审美的常见倾向,不是铁律 —— 标注「并非定律」的题,反着拍也可能更妙。</div>
  </footer>
</main>

<script>
/* ============================================================
   题库:每题只改动一个审美变量。
   good / bad 为同一场景的两个版本,渲染时随机分配到 A / B 槽。
   ============================================================ */

// —— 复用绘图片段 ——
const grain = '<rect width="600" height="400" filter="url(#grain)" opacity="0.05" style="mix-blend-mode:overlay"/>';
// 人物剪影(朝右),x 为脚下中心,s 为缩放
function person(x, ground, s){
  const h = 70*s;
  return `<g fill="#171318" transform="translate(${x},${ground})">
    <ellipse cx="0" cy="2" rx="${16*s}" ry="${4*s}" fill="#000" opacity="0.35"/>
    <circle cx="${2*s}" cy="${-h-10*s}" r="${9*s}"/>
    <path d="M ${-10*s} 0 Q ${-9*s} ${-h} ${1*s} ${-h-2*s} Q ${12*s} ${-h} ${11*s} 0 Z"/>
    <path d="M ${9*s} ${-h-2*s} l ${6*s} ${2*s} l ${-6*s} ${4*s} Z"/>
  </g>`; // 末尾小三角 = 朝右
}
// 海鸥剪影
function gull(x,y,s){return `<path d="M ${x-14*s} ${y} Q ${x-6*s} ${y-9*s} ${x} ${y} Q ${x+6*s} ${y-9*s} ${x+14*s} ${y}" stroke="#2a2630" stroke-width="${2.4*s}" fill="none" stroke-linecap="round"/>`;}
// 小帆船
function boat(x,y,s){return `<g transform="translate(${x},${y})" fill="#2c2735"><path d="M ${-9*s} 0 h ${18*s} l ${-3*s} ${5*s} h ${-12*s} Z"/><path d="M 0 0 v ${-16*s} l ${9*s} ${13*s} Z"/></g>`;}
// 蓬松树
function tree(x,ground,s,trunk,crown,lit){
  return `<g transform="translate(${x},${ground})">
    <rect x="${-4*s}" y="${-46*s}" width="${8*s}" height="${48*s}" fill="${trunk}"/>
    <circle cx="0" cy="${-58*s}" r="${26*s}" fill="${crown}"/>
    <circle cx="${-18*s}" cy="${-46*s}" r="${18*s}" fill="${crown}"/>
    <circle cx="${18*s}" cy="${-46*s}" r="${18*s}" fill="${crown}"/>
    <circle cx="0" cy="${-40*s}" r="${20*s}" fill="${crown}"/>
    ${lit?`<path d="M ${-2*s} ${-84*s} A ${26*s} ${26*s} 0 0 0 ${-26*s} ${-50*s}" stroke="${lit}" stroke-width="${3*s}" fill="none" opacity="0.9"/>`:''}
  </g>`;
}
// 远山层
function ridge(y,h,fill,seed){
  const pts=[]; for(let x=0;x<=600;x+=60){const j=((x*seed)%97)/97; pts.push(`${x},${y - j*h}`);}
  return `<polygon points="0,400 ${pts.join(' ')} 600,400" fill="${fill}"/>`;
}
// 花
function flower(x,y,s,petal,center){
  let p=''; for(let k=0;k<6;k++){const a=k*Math.PI/3, px=x+Math.cos(a)*16*s, py=y+Math.sin(a)*16*s;
    p+=`<ellipse cx="${px}" cy="${py}" rx="${13*s}" ry="${8*s}" fill="${petal}" transform="rotate(${k*60} ${px} ${py})"/>`;}
  return `<g>${p}<circle cx="${x}" cy="${y}" r="${10*s}" fill="${center}"/></g>`;
}
// 头肩半身剪影(topY = 头顶 y)
function bust(cx,topY,s){
  return `<g fill="#171318"><circle cx="${cx}" cy="${topY+20*s}" r="${20*s}"/>
    <path d="M ${cx-42*s} 400 Q ${cx-44*s} ${topY+54*s} ${cx} ${topY+46*s} Q ${cx+44*s} ${topY+54*s} ${cx+42*s} 400 Z"/></g>`;
}
// 汽车剪影
function car(x,ground,s){
  return `<g transform="translate(${x},${ground})" fill="#1d1a22">
    <path d="M ${-56*s} 0 Q ${-54*s} ${-24*s} ${-26*s} ${-26*s} L ${-12*s} ${-44*s} Q ${10*s} ${-48*s} ${26*s} ${-30*s} L ${50*s} ${-26*s} Q ${60*s} ${-22*s} ${56*s} 0 Z"/>
    <circle cx="${-30*s}" cy="0" r="${12*s}"/><circle cx="${34*s}" cy="0" r="${12*s}"/></g>`;
}

// <<<QUESTIONS:BEGIN>>> 此区块由 build.mjs 从 questions/*.json 自动生成,请勿手改

/* ============================================================
   逻辑
   ============================================================ */
const state = { i:0, score:0, answered:false, log:[], order:[] };
const $ = id => document.getElementById(id);

function buildOrder(){
  // 每题随机决定 good 放 A 还是 B
  state.order = RAW.map(()=> Math.random() < 0.5 ? 'A' : 'B');
}

function svgWrap(inner){
  return `<svg viewBox="0 0 600 400" preserveAspectRatio="xMidYMid slice" role="img">${inner}</svg>`;
}

function renderQuestion(){
  const q = RAW[state.i];
  const goodSlot = state.order[state.i];
  state.answered = false;

  $('counterText').textContent = String(state.i+1).padStart(2,'0') + ' / ' + String(RAW.length).padStart(2,'0');
  $('eyebrow').textContent = q.eyebrow;
  $('qTitle').textContent = q.title;
  $('qHint').textContent = q.hint;

  $('canvasA').innerHTML = svgWrap(goodSlot==='A' ? q.good : q.bad);
  $('canvasB').innerHTML = svgWrap(goodSlot==='B' ? q.good : q.bad);

  // 复位样式
  ['slotA','slotB'].forEach(s=>{
    const el=$(s); el.className='shot'; el.removeAttribute('data-mark');
    el.style.pointerEvents=''; 
  });
  $('pair').classList.remove('answered');
  $('readout').classList.remove('show');
  $('actions').style.visibility='hidden';
}

function choose(slot){
  if(state.answered) return;
  state.answered = true;
  const q = RAW[state.i];
  const goodSlot = state.order[state.i];
  const correct = slot === goodSlot;
  if(correct) state.score++;
  state.log.push({ q, correct });

  const goodEl = $('slot'+goodSlot);
  const badEl  = $('slot'+(goodSlot==='A'?'B':'A'));
  goodEl.classList.add('is-good');
  badEl.classList.add('is-bad');
  $('slot'+slot).classList.add('picked');
  if(!correct) $('slot'+slot).classList.add('shake');
  $('pair').classList.add('answered');

  // 解析
  $('vBadge').textContent = correct ? '看对了' : '差一点';
  $('vBadge').className = 'badge ' + (correct ? 'ok' : 'no');
  $('vText').textContent = q.verdict;
  $('vPoints').innerHTML = q.points.map(p=>`<li>${p}</li>`).join('');
  if(q.soft){
    $('vSoft').style.display='block';
    let label='补充', body=q.soft;
    const m = q.soft.match(/^(并非定律|练法)[：:]\s*/);
    if(m){ label=m[1]; body=q.soft.slice(m[0].length); }
    $('vSoft').innerHTML = '<b>'+label+'</b> · ' + body;
  }
  else $('vSoft').style.display='none';
  $('readout').classList.add('show');

  $('nextBtn').innerHTML = (state.i === RAW.length-1)
    ? '看成绩 <span class="arrow">→</span>'
    : '下一张 <span class="arrow">→</span>';
  $('actions').style.visibility='visible';
  $('nextBtn').focus();
}

function next(){
  if(state.i < RAW.length-1){ state.i++; renderQuestion(); window.scrollTo({top:0,behavior:'smooth'}); }
  else showResult();
}

function showResult(){
  $('quizView').style.display='none';
  $('resultView').style.display='block';
  $('counter').style.visibility='hidden';
  $('scoreNum').textContent = state.score;
  $('scoreOf').textContent = RAW.length;

  const s = state.score, pct = s / RAW.length, gradeEl=$('grade'), blurbEl=$('blurb');
  let grade, blurb;
  if(pct>=0.9){ grade='摄影眼 · 满格'; blurb='几乎全中。构图、用光、留白你都拎得清——下一步是带着这套直觉去打破它。'; }
  else if(pct>=0.7){ grade='眼力很稳'; blurb='大方向都对。回看错的那几题,多半是「视线空间」或「时机」这类需要多按几千次快门才长进的细节。'; }
  else if(pct>=0.5){ grade='正在开窍'; blurb='基本盘有了。试着每次按快门前默念一遍九宫格,把这些原则从「知道」练成「下意识」。'; }
  else{ grade='刚上手'; blurb='别灰心——审美是看出来、拍出来的。把下面每条解析当成取景清单,带着它去拍一周再回来。'; }
  gradeEl.textContent = grade; blurbEl.textContent = blurb;

  $('recap').innerHTML = state.log.map((r,idx)=>`
    <div class="row">
      <span class="idx">${String(idx+1).padStart(2,'0')}</span>
      <span class="dim">${r.q.title.replace(/[？?]/,'')}<small>${r.q.en}</small></span>
      <span class="mk ${r.correct?'y':'n'}">${r.correct?'对':'错'}</span>
    </div>`).join('');
}

function restart(){
  state.i=0; state.score=0; state.answered=false; state.log=[];
  buildOrder();
  $('resultView').style.display='none';
  $('quizView').style.display='block';
  $('counter').style.visibility='visible';
  renderQuestion();
  window.scrollTo({top:0,behavior:'smooth'});
}

// 事件绑定
['slotA','slotB'].forEach(s=>{
  const el=$(s);
  el.addEventListener('click', ()=> choose(el.dataset.slot));
  el.addEventListener('keydown', e=>{
    if(e.key==='Enter'||e.key===' '){ e.preventDefault(); choose(el.dataset.slot); }
  });
});
$('nextBtn').addEventListener('click', next);
$('againBtn').addEventListener('click', restart);
$('gridToggle').addEventListener('click', function(){
  const on = this.getAttribute('aria-pressed')==='true';
  this.setAttribute('aria-pressed', String(!on));
  document.querySelector('.stage').classList.toggle('grids-on', !on);
});

buildOrder();
renderQuestion();
</script>
